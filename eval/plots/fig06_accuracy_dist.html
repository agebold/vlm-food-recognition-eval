  const vals = model.entries.map(e=>e.acc);
  const jits = model.entries.map(e=>e.jit);
  const sorted = [...vals].sort((a,b)=>a-b);
  const n = sorted.length;
  const q1 = d3.quantile(sorted,0.25);
  const q2 = d3.quantile(sorted,0.5);
  const q3 = d3.quantile(sorted,0.75);
  const iqr = q3-q1;
  const wlo = Math.max(sorted[0], q1-1.5*iqr);
  const whi = Math.min(sorted[n-1], q3+1.5*iqr);
  const jitterH = ROW_H * 0.38;

  // Strip dots
  g.selectAll(null).data(model.entries).join("circle")
    .attr("cx",d=>x(d.acc))
    .attr("cy",d=>cy + d.jit*jitterH)
    .attr("r",2.2).attr("fill",model.color).attr("opacity",0.22);

  // Whisker lines
  g.append("line")
    .attr("x1",x(wlo)).attr("x2",x(q1))
    .attr("y1",cy).attr("y2",cy)
    .attr("stroke",model.color).attr("stroke-width",1.5).attr("stroke-dasharray","3,2").attr("opacity",0.7);
  g.append("line")
    .attr("x1",x(q3)).attr("x2",x(whi))
    .attr("y1",cy).attr("y2",cy)
    .attr("stroke",model.color).attr("stroke-width",1.5).attr("stroke-dasharray","3,2").attr("opacity",0.7);

  // IQR box
  g.append("rect")
    .attr("x",x(q1)).attr("y",cy-ROW_H*0.22)
    .attr("width",x(q3)-x(q1)).attr("height",ROW_H*0.44)
    .attr("fill","white").attr("stroke",model.color).attr("stroke-width",2).attr("rx",3);

  // Median line
  g.append("line")
    .attr("x1",x(q2)).attr("x2",x(q2))
    .attr("y1",cy-ROW_H*0.22).attr("y2",cy+ROW_H*0.22)
    .attr("stroke",model.color).attr("stroke-width",3.5);

  // Median + Q1/Q3 labels
  g.append("text").attr("x",x(q2)).attr("y",cy-ROW_H*0.22-6)
    .attr("text-anchor","middle").attr("font-size",9.5).attr("font-weight","800").attr("fill",model.color)
    .text(q2.toFixed(0)+"%");
  g.append("text").attr("x",x(q1)-2).attr("y",cy+2)
    .attr("text-anchor","end").attr("font-size",8).attr("fill",model.color).attr("opacity",0.7)
    .text(q1.toFixed(0));
  g.append("text").attr("x",x(q3)+2).attr("y",cy+2)
    .attr("text-anchor","start").attr("font-size",8).attr("fill",model.color).attr("opacity",0.7)
    .text(q3.toFixed(0));
});

// Y axis (model names)
const yAx = g.append("g").call(
  d3.axisLeft(d3.scaleOrdinal().domain(data.map(d=>d.model))
    .range(data.map((_,i)=>i*ROW_H+ROW_H/2))).tickSize(0));
yAx.select(".domain").remove();
yAx.selectAll("text").attr("font-size",11).attr("font-weight","600").attr("dx","-8")
  .attr("fill",(_,i)=>data[i].color);

// X axis
const xAx = g.append("g").attr("transform",`translate(0,${H})`).call(
  d3.axisBottom(x).ticks(10).tickFormat(d=>d+"%"));
xAx.select(".domain").attr("stroke","#ccc");
xAx.selectAll(".tick line").attr("stroke","#ddd");
xAx.selectAll("text").attr("font-size",9.5);
g.append("text").attr("x",W/2).attr("y",H+44)
  .attr("text-anchor","middle").attr("class","axis-label")
  .text("Prediction accuracy per dish  (correct / predicted)");

</script>
