  return thresholds.map(x => [x, d3.mean(values, v => kernel(x - v))]);

  g.append("line").attr("x1",x(v)).attr("x2",x(v)).attr("y1",0).attr("y2",H)
   .attr("stroke",v===100?"#E5E7EB":"#F3F4F6").attr("stroke-width",1)
   .attr("stroke-dasharray",v===100?"4,3":"none");
  g.append("text").attr("x",x(v)).attr("y",-6).attr("text-anchor","middle")
   .attr("font-size",10).attr("fill","#D1D5DB").text(v+"%");
});

rawData.forEach((model,i)=>{
  const baseline=i*ROW+ROW;
  const density=kde(epanechnikov(bw), thresholds, model.vals);
  const maxDensity=d3.max(density,d=>d[1]);
  const ridgeH=ROW*(1+OVERLAP);
  const yScale=d3.scaleLinear().domain([0,maxDensity]).range([0,ridgeH]);

  const area=d3.area()
    .x(d=>x(d[0]))
    .y0(0)
    .y1(d=>-yScale(d[1]))
    .curve(d3.curveBasis);

  const group=g.append("g").attr("transform",`translate(0,${baseline})`);

  // Baseline
  group.append("line").attr("x1",0).attr("x2",W).attr("y1",0).attr("y2",0)
    .attr("stroke","#E5E7EB").attr("stroke-width",0.8);

  // Fill
  group.append("path").datum(density)
    .attr("d",area)
    .attr("fill",model.color).attr("opacity",0.18);

  // Stroke
  const line=d3.line().x(d=>x(d[0])).y(d=>-yScale(d[1])).curve(d3.curveBasis);
  group.append("path").datum(density)
    .attr("d",line)
    .attr("fill","none").attr("stroke",model.color).attr("stroke-width",2.5).attr("opacity",0.9);

  // Median line
  group.append("line")
    .attr("x1",x(model.med)).attr("x2",x(model.med))
    .attr("y1",0).attr("y2",-ridgeH*0.65)
    .attr("stroke",model.color).attr("stroke-width",2).attr("stroke-dasharray","4,3");

  // Median label
  group.append("text")
    .attr("x",x(model.med)).attr("y",-ridgeH*0.65-6)
    .attr("text-anchor","middle").attr("font-size",9.5).attr("font-weight","700")
    .attr("fill",model.color).text(model.med.toFixed(0)+"%");

  // Model label (left)
  group.append("text").attr("x",-10).attr("y",-ROW*0.35)
    .attr("text-anchor","end").attr("font-size",10.5).attr("font-weight","700")
    .attr("fill",model.color).attr("dy","0.35em").text(model.model);
});

// X axis
const xAx=g.append("g").attr("transform",`translate(0,${H})`).call(
  d3.axisBottom(x).tickValues([0,20,40,60,80,100]).tickFormat(d=>d+"%").tickSize(5));
xAx.select(".domain").attr("stroke","#E5E7EB");
xAx.selectAll("text").attr("font-size",10);
g.append("text").attr("x",W/2).attr("y",H+44)
  .attr("text-anchor","middle").attr("class","axis-label")
  .text("Per-dish prediction accuracy  (correct / predicted)");

// Annotation
g.append("text").attr("x",x(98)).attr("y",rawData.length*ROW*0.08)
  .attr("text-anchor","end").attr("font-size",10).attr("fill","#6B7280").attr("font-style","italic")
  .text("peak near 100% = most predictions are correct →");

</script>
