   .attr("stroke",v===100?"#CBD5E1":"#E5E7EB").attr("stroke-width",v===100?1.5:0.8);
  g.append("text").attr("x",x(v)).attr("y",-10).attr("text-anchor","middle")
   .attr("font-size",11).attr("fill","#9CA3AF").text(v+"%");
});

models.forEach((m,i)=>{
  const cy=i*ROW+ROW/2;
  const density=kde(BW, xs, m.vals);
  const maxD=d3.max(density,d=>d[1]);
  const half=ROW*0.42;
  const ys=d3.scaleLinear().domain([0,maxD]).range([0,half]);

  // Upper & lower violin — use real fill color, no opacity < 0.85
  const upperArea=d3.area().x(d=>x(d[0])).y0(cy).y1(d=>cy-ys(d[1])).curve(d3.curveBasis);
  const lowerArea=d3.area().x(d=>x(d[0])).y0(cy).y1(d=>cy+ys(d[1])).curve(d3.curveBasis);
  g.append("path").datum(density).attr("d",upperArea).attr("fill",m.color).attr("fill-opacity",0.85);
  g.append("path").datum(density).attr("d",lowerArea).attr("fill",m.color).attr("fill-opacity",0.85);

  // Outline
  const uLine=d3.line().x(d=>x(d[0])).y(d=>cy-ys(d[1])).curve(d3.curveBasis);
  const lLine=d3.line().x(d=>x(d[0])).y(d=>cy+ys(d[1])).curve(d3.curveBasis);
  g.append("path").datum(density).attr("d",uLine).attr("fill","none").attr("stroke",m.color).attr("stroke-width",2);
  g.append("path").datum(density).attr("d",lLine).attr("fill","none").attr("stroke",m.color).attr("stroke-width",2);

  // IQR box — solid white
  const bh=half*0.42;
  g.append("rect")
   .attr("x",x(m.q1)).attr("y",cy-bh/2)
   .attr("width",x(m.q3)-x(m.q1)).attr("height",bh)
   .attr("fill","#fff").attr("stroke",m.color).attr("stroke-width",2).attr("rx",2);

  // Median — white dot, colored ring, colored center
  g.append("circle").attr("cx",x(m.med)).attr("cy",cy).attr("r",9).attr("fill","#fff").attr("stroke",m.color).attr("stroke-width",2.5);
  g.append("circle").attr("cx",x(m.med)).attr("cy",cy).attr("r",4.5).attr("fill",m.color);

  // Median label — above violin
  g.append("text").attr("x",x(m.med)).attr("y",cy-half-12)
   .attr("text-anchor","middle").attr("font-size",12).attr("font-weight","800")
   .attr("fill",m.color).text(m.med.toFixed(0)+"%");

  // Model name — left, colored, bold
  g.append("text").attr("x",-14).attr("y",cy).attr("dy","0.35em")
   .attr("text-anchor","end").attr("font-size",12).attr("font-weight","700")
   .attr("fill",m.color).text(m.model);
});

// X axis
const xAx=g.append("g").attr("transform",`translate(0,${H})`).call(
  d3.axisBottom(x).tickValues([0,25,50,75,100]).tickFormat(d=>d+"%").tickSize(5));
xAx.select(".domain").attr("stroke","#D1D5DB");
xAx.selectAll("text").attr("font-size",11).attr("fill","#6B7280");
xAx.selectAll(".tick line").attr("stroke","#D1D5DB");
g.append("text").attr("class","axl").attr("x",W/2).attr("y",H+50)
  .attr("text-anchor","middle").text("Per-dish prediction accuracy  (correct ÷ predicted)");

// Annotation
g.append("text").attr("x",x(98)).attr("y",models.length*ROW+16)
  .attr("text-anchor","end").attr("font-size",10.5).attr("font-weight","500")
  .attr("fill","#6B7280").attr("font-style","italic")
  .text("spike at 100% = dishes where every prediction was correct →");

</script></body>
</html>
